services:
  - type: web
    name: keyshield-ai-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && python -m backend.db.init_db
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
