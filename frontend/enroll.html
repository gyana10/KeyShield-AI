<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Behavior Enrollment</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <h1>Behavior Enrollment</h1>

    <p>
        Type the paragraph exactly as shown.
    </p>

    <div id="paragraphBox">

        <p id="paragraph">

            The quick brown fox jumps over the lazy dog.

        </p>

    </div>

    <br>

    <textarea

        id="typingArea"

        rows="6"

        cols="70"

        placeholder="Start typing here..."

    ></textarea>

    <br><br>

    <button id="submitBtn">

        Finish Attempt

    </button>

    <br><br>

    <p id="status"></p>

</div>

<script src="js/typing.js"></script>
<script src="js/featureExtractor.js"></script>
<script src="js/enroll.js"></script>

</body>

</html>
