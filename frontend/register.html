<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | KeyShield AI</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

    <h1>Create Account</h1>

    <form id="registerForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <br><br>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">

            Register

        </button>

    </form>

    <br>

    <p id="message"></p>

    <br>

    <a href="login.html">

        Already have an account?

    </a>

</div>

<script src="js/register.js"></script>

</body>

</html>
