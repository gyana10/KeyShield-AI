<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - KeyShield AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="brand">
            <div class="brand-icon">🛡️</div>
            <span>KeyShield AI</span>
        </a>
    </header>

    <main class="container" style="display: flex; align-items: center; justify-content: center;">
        <div class="glass-card" style="width: 100%; max-width: 440px;">
            <h2 style="font-size: 1.6rem; font-weight: 700; margin-bottom: 0.5rem; text-align: center;">Create Account</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-bottom: 1.75rem;">
                Enroll your biometrics profile on KeyShield AI
            </p>

            <div id="alert-box" style="display: none; padding: 0.75rem; border-radius: var(--radius-md); font-size: 0.85rem; margin-bottom: 1rem; text-align: center;"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="johndoe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password (Min 8 chars, 1 Upper, 1 Lower, 1 Digit)</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>

                <button type="submit" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">
                    Create Account
                </button>
            </form>

            <p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; margin-top: 1.5rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none;">Sign In</a>
            </p>
        </div>
    </main>

    <footer>
        <p>KeyShield AI &copy; 2026</p>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
